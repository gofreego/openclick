syntax = "proto3";
package v1;

option go_package = "./openclick_v1";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "proto/common/ping.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "OpenClick APIs"
    version: "v1.0.0"
    description: "**OpenClick** is an open-source, self-hostable product analytics platform built for speed and low memory footprint. It provides event tracking, session replay, funnel analysis, feature flags, and cohort analytics."
  }
  tags: [
    {
      name: "Ping"
      description: "Health check endpoints"
    }
  ]
  security_definitions: {
    security: {
      key: "UserID";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "x-user-id";
      }
    }
    security: {
      key: "UserPerms";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "x-user-perms";
      }
    }
  }
  security: {
    security_requirement: {
      key: "UserID";
      value: {}
    }
    security_requirement: {
      key: "UserPerms";
      value: {}
    }
  }
};

service BaseService {
    
    // Ping is a simple GET request that returns a Pong message.
    rpc Ping (PingRequest) returns (PingResponse) {
        option (google.api.http) = {
            get: "/openclick/v1/ping"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Ping"
            summary: "Ping the server"
            description: "Check if the server is alive."
        };
    }
}

